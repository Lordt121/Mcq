<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>MCQ Admin</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
            <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
              <link rel="stylesheet" href="styles.css" />
              </head>
              <body>
                <div class="sheet">

                    <!-- LOGIN FORM — shown when not signed in -->
                        <div id="login-view" class="login-box">
                              <div class="sheet-eyebrow">Admin · Sign in</div>
                                    <h1 class="sheet-title">MCQ Admin</h1>
                                          <div id="login-notice"></div>
                                                <form id="login-form">
                                                        <div class="field-block">
                                                                  <label class="field-label" for="login-email">Email</label>
                                                                            <input type="email" id="login-email" class="field-input" autocomplete="username" required />
                                                                                    </div>
                                                                                            <div class="field-block">
                                                                                                      <label class="field-label" for="login-password">Password</label>
                                                                                                                <input type="password" id="login-password" class="field-input" autocomplete="current-password" required />
                                                                                                                        </div>
                                                                                                                                <button type="submit" class="btn" style="width:100%">Sign in</button>
                                                                                                                                      </form>
                                                                                                                                          </div>

                                                                                                                                              <!-- ADMIN PANEL — shown when signed in -->
                                                                                                                                                  <div id="admin-view" style="display:none">
                                                                                                                                                        <header class="sheet-header">
                                                                                                                                                                <div class="sheet-header__top">
                                                                                                                                                                          <div>
                                                                                                                                                                                      <div class="sheet-eyebrow">Admin</div>
                                                                                                                                                                                                  <h1 class="sheet-title">MCQ Admin Panel</h1>
                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                      <div class="sheet-meta">
                                                                                                                                                                                                                                  <span id="admin-email"></span><br />
                                                                                                                                                                                                                                              <a href="#" id="logout-link">Sign out</a>
                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                      </header>

                                                                                                                                                                                                                                                                            <!-- TAB BUTTONS -->
                                                                                                                                                                                                                                                                                  <div class="admin-tabs">
                                                                                                                                                                                                                                                                                          <button class="admin-tab is-active" data-tab="questions">Questions</button>
                                                                                                                                                                                                                                                                                                  <button class="admin-tab" data-tab="results">Results</button>
                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                              <!-- QUESTIONS TAB -->
                                                                                                                                                                                                                                                                                                                    <section class="admin-section is-active" id="tab-questions">
                                                                                                                                                                                                                                                                                                                            <div class="field-block">
                                                                                                                                                                                                                                                                                                                                      <h2 class="admin-card-title" id="question-form-title">Add a question</h2>
                                                                                                                                                                                                                                                                                                                                                <form id="question-form" class="form-grid">
                                                                                                                                                                                                                                                                                                                                                            <div class="form-row">
                                                                                                                                                                                                                                                                                                                                                                          <label class="field-label" for="q-text">Question</label>
                                                                                                                                                                                                                                                                                                                                                                                        <textarea id="q-text" class="field-input" rows="2" required></textarea>
                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                <div class="form-row--two">
                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="form-row--inline">
                                                                                                                                                                                                                                                                                                                                                                                                                                              <span class="bubble bubble--label">A</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                              <input type="text" class="field-input" id="q-option-a" placeholder="Option A" required />
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="form-row--inline">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <span class="bubble bubble--label">B</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <input type="text" class="field-input" id="q-option-b" placeholder="Option B" required />
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="form-row--two">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="form-row--inline">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <span class="bubble bubble--label">C</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <input type="text" class="field-input" id="q-option-c" placeholder="Option C (optional)" />
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="form-row--inline">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <span class="bubble bubble--label">D</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <input type="text" class="field-input" id="q-option-d" placeholder="Option D (optional)" />
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="form-row">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <label class="field-label">Correct answer</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="correct-pick" id="correct-pick">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button type="button" class="correct-pick__option is-active" data-letter="A">A</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button type="button" class="correct-pick__option" data-letter="B">B</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button type="button" class="correct-pick__option" data-letter="C">C</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button type="button" class="correct-pick__option" data-letter="D">D</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div id="question-form-notice"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="actions" style="margin:0; gap:8px">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button type="button" class="btn btn--secondary" id="cancel-edit-btn" style="display:none">Cancel</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <button type="submit" class="btn" id="question-submit-btn">Add question</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </form>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="section-actions">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <span class="section-actions__count" id="question-count-label"></span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <button class="btn btn--secondary" id="seed-btn">Load sample questions</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div id="question-list"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </section>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <!-- RESULTS TAB -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <section class="admin-section" id="tab-results">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="section-actions">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <span class="section-actions__count" id="results-count-label"></span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <button class="btn btn--secondary" id="refresh-results-btn">Refresh</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div id="results-table-wrap"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="detail-panel" id="result-detail"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </section>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="sheet-footer">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <a href="index.html">Back to quiz</a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <script type="module" src="admin.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </html>
